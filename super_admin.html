<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="estilos.css">
    <link rel="icon" href="/static/favicon.ico">
    <title>CoreBilling - Panel Super Administrador</title>
    <style>
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .table-container {
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            background: white;
            margin-top: 12px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #f8fafc;
            color: #475569;
            font-weight: 600;
            padding: 12px 10px;
            border-bottom: 2px solid #e2e8f0;
            text-align: left;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        tr:hover td {
            background: #f8fafc;
        }
        .badge-estado {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-activa {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-inactiva {
            background: #fee2e2;
            color: #991b1b;
        }
        .btn-accion {
            padding: 4px 10px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 2px;
            font-size: 0.7rem;
        }
        .btn-accion.warning { background: #f59e0b; color: white; }
        .btn-accion.warning:hover { background: #d97706; transform: translateY(-2px); }
        .btn-accion.success { background: #10b981; color: white; }
        .btn-accion.success:hover { background: #059669; transform: translateY(-2px); }
        .btn-accion.primary { background: #4f46e5; color: white; }
        .btn-accion.primary:hover { background: #4338ca; transform: translateY(-2px); }
        .btn-accion.danger { background: #ef4444; color: white; }
        .btn-accion.danger:hover { background: #dc2626; transform: translateY(-2px); }
        .modal-content {
            max-width: 520px;
        }
        .modal-content .input-group {
            margin-bottom: 14px;
        }
        .modal-content .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
            margin-bottom: 4px;
        }
        .modal-content .input-group input,
        .modal-content .input-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .modal-content .input-group input:focus,
        .modal-content .input-group select:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
            outline: none;
        }
        .flex-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        hr {
            border: none;
            border-top: 2px dashed #e2e8f0;
            margin: 16px 0;
        }
        @media (max-width: 640px) {
            th, td { font-size: 0.75rem; padding: 6px 4px; }
            .btn-accion { font-size: 0.65rem; padding: 3px 6px; }
            .modal-content { padding: 16px; }
        }
    </style>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
<div class="sidebar" id="sidebar">
    <h4>CoreBilling</h4>
    <a href="super_admin.html" class="active">🏢 Super Admin</a>
    <a href="#" id="logoutBtn" class="salir">🚪 Cerrar Sesión</a>
</div>
<div class="main-content">
    <button class="menu-toggle" id="menuToggle">☰ Menú</button>

    <div class="card">
        <div class="header-box">
            <h2 style="font-weight:700;">🏢 Panel de Super Administrador</h2>
            <span style="font-size:0.9rem; color:#64748b;">Gestión global de empresas registradas</span>
        </div>

        <div class="table-container">
            <table id="tablaEmpresas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>RIF</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Admin</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbody-empresas">
                    <tr><td colspan="8" style="text-align:center; padding:30px; color:#94a3b8;">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para editar empresa -->
<div id="modalEditar" class="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); justify-content:center; align-items:center; z-index:2000;">
    <div class="modal-content" style="background:white; max-width:520px; width:95%; padding:24px; border-radius:28px;">
        <span class="close-modal" onclick="cerrarModalEditar()" style="float:right; font-size:28px; cursor:pointer;">&times;</span>
        <h3 style="margin-bottom:16px;">Editar Empresa</h3>
        <form id="formEditar">
            <input type="hidden" id="edit-id">
            <div class="input-group">
                <label>🏪 Nombre</label>
                <input type="text" id="edit-nombre" required>
            </div>
            <div class="input-group">
                <label>📄 RIF</label>
                <input type="text" id="edit-rif" required>
            </div>
            <div class="input-group">
                <label>📧 Correo</label>
                <input type="email" id="edit-correo" required>
            </div>
            <div class="input-group">
                <label>📞 Teléfono</label>
                <input type="text" id="edit-telefono">
            </div>
            <div class="input-group">
                <label>📍 Dirección</label>
                <input type="text" id="edit-direccion">
            </div>
            <div class="input-group">
                <label>💱 Tasa de cambio (Bs/USD)</label>
                <input type="number" step="0.01" id="edit-tasa" required>
            </div>
            <hr>
            <h4 style="font-weight:600; margin-bottom:12px;">Usuario Administrador</h4>
            <div class="input-group">
                <label>👤 Nombre de usuario</label>
                <input type="text" id="edit-admin-username">
            </div>
            <div class="input-group">
                <label>📧 Email del administrador</label>
                <input type="email" id="edit-admin-email">
            </div>
            <div class="input-group">
                <label>🔒 Nueva contraseña (dejar vacío para no cambiar)</label>
                <input type="password" id="edit-admin-password" placeholder="Dejar vacío para no cambiar">
            </div>
            <div class="flex-btns">
                <button type="submit" class="btn-success">Guardar cambios</button>
                <button type="button" class="btn-danger" onclick="cerrarModalEditar()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = '/api';
    let empresas = [];

    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m); }

    async function verificarSesion() {
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = 'login.html';
            return null;
        }
        try {
            const res = await fetch(`${API_URL}/check-session`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (!data.logged_in || data.role !== 'super_admin') {
                alert('Acceso denegado. Solo super administrador.');
                window.location.href = 'login.html';
                return null;
            }
            return data;
        } catch(e) {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
            return null;
        }
    }

    async function cargarEmpresas() {
        const token = localStorage.getItem('token');
        const tbody = document.getElementById('tbody-empresas');
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px; color:#94a3b8;">Cargando...</td></tr>';
        try {
            const res = await fetch(`${API_URL}/super/empresas`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error('No autorizado');
            empresas = await res.json();
            if (empresas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px; color:#94a3b8;">No hay empresas registradas</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            empresas.forEach(emp => {
                const estadoClass = emp.activa ? 'badge-activa' : 'badge-inactiva';
                const estadoText = emp.activa ? '✅ Activa' : '❌ Inactiva';
                tbody.innerHTML += `
                    <tr>
                        <td>${emp.id}</td>
                        <td>${escapeHtml(emp.nombre || '')}</td>
                        <td>${escapeHtml(emp.rif || '')}</td>
                        <td>${escapeHtml(emp.correo || '')}</td>
                        <td>${escapeHtml(emp.telefono || '')}</td>
                        <td>${escapeHtml(emp.admin_username || '')}</td>
                        <td><span class="badge-estado ${estadoClass}">${estadoText}</span></td>
                        <td>
                            <button class="btn-accion warning" onclick="abrirEditar(${emp.id})">✏️ Editar</button>
                            <button class="btn-accion success" onclick="toggleEstado(${emp.id})">${emp.activa ? '🔒 Desactivar' : '🔓 Activar'}</button>
                            <button class="btn-accion primary" onclick="resetearEmpresa(${emp.id})">🔄 Reiniciar</button>
                            <button class="btn-accion danger" onclick="eliminarEmpresa(${emp.id})">🗑️ Eliminar</button>
                        </td>
                    </tr>
                `;
            });
        } catch(e) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding:30px; color:#ef4444;">❌ Error: ${escapeHtml(e.message)}</td></tr>`;
        }
    }

    async function toggleEstado(id) {
        if (!confirm('¿Cambiar el estado de activación de esta empresa?')) return;
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_URL}/super/empresas/${id}/toggle-status`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                alert('✅ Estado actualizado');
                cargarEmpresas();
            } else {
                alert('❌ Error al cambiar estado');
            }
        } catch(e) {
            alert('❌ Error de conexión: ' + e.message);
        }
    }

    function abrirEditar(id) {
        const empresa = empresas.find(e => e.id === id);
        if (!empresa) return;
        document.getElementById('edit-id').value = empresa.id;
        document.getElementById('edit-nombre').value = empresa.nombre || '';
        document.getElementById('edit-rif').value = empresa.rif || '';
        document.getElementById('edit-correo').value = empresa.correo || '';
        document.getElementById('edit-telefono').value = empresa.telefono || '';
        document.getElementById('edit-direccion').value = empresa.direccion || '';
        document.getElementById('edit-tasa').value = empresa.tasa_cambio || 544.58;
        document.getElementById('edit-admin-username').value = empresa.admin_username || '';
        document.getElementById('edit-admin-email').value = empresa.admin_email || '';
        document.getElementById('edit-admin-password').value = '';
        document.getElementById('modalEditar').style.display = 'flex';
    }

    function cerrarModalEditar() {
        document.getElementById('modalEditar').style.display = 'none';
    }

    document.getElementById('formEditar').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        const payload = {
            nombre: document.getElementById('edit-nombre').value,
            rif: document.getElementById('edit-rif').value,
            correo: document.getElementById('edit-correo').value,
            telefono: document.getElementById('edit-telefono').value,
            direccion: document.getElementById('edit-direccion').value,
            tasa_cambio: parseFloat(document.getElementById('edit-tasa').value),
            admin_username: document.getElementById('edit-admin-username').value,
            admin_email: document.getElementById('edit-admin-email').value,
            admin_password: document.getElementById('edit-admin-password').value
        };
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_URL}/super/empresas/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                alert('✅ Empresa actualizada');
                cerrarModalEditar();
                cargarEmpresas();
            } else {
                const err = await res.json();
                alert('❌ Error: ' + (err.error || 'No se pudo actualizar'));
            }
        } catch(e) {
            alert('❌ Error de conexión: ' + e.message);
        }
    });

    async function resetearEmpresa(id) {
        if (!confirm('⚠️ ADVERTENCIA: Se borrarán TODOS los datos de esta empresa (productos, facturas, clientes, historiales). Los usuarios y la empresa se conservarán. ¿Estás seguro?')) return;
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_URL}/super/empresas/${id}/reset`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                alert('✅ Empresa reiniciada correctamente');
                cargarEmpresas();
            } else {
                alert('❌ Error al reiniciar');
            }
        } catch(e) {
            alert('❌ Error de conexión: ' + e.message);
        }
    }

    async function eliminarEmpresa(id) {
        if (!confirm('⚠️ ELIMINACIÓN PERMANENTE: Se borrará la empresa y TODOS sus datos (incluyendo usuarios). Esta acción no se puede deshacer. ¿Continuar?')) return;
        const token = localStorage.getItem('token');
        try {
            const res = await fetch(`${API_URL}/super/empresas/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                alert('✅ Empresa eliminada');
                cargarEmpresas();
            } else {
                alert('❌ Error al eliminar');
            }
        } catch(e) {
            alert('❌ Error de conexión: ' + e.message);
        }
    }

    document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    document.getElementById('logoutBtn').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('token');
        window.location.href = 'login.html';
    });

    verificarSesion().then(() => cargarEmpresas());
    window.toggleEstado = toggleEstado;
    window.abrirEditar = abrirEditar;
    window.cerrarModalEditar = cerrarModalEditar;
    window.resetearEmpresa = resetearEmpresa;
    window.eliminarEmpresa = eliminarEmpresa;
</script>
</body>
</html>
